    <main>
      <div class="carousel">

      <div class="card">

    </main>
    <footer>

    </footer>
    </div>
    <script>
      let slides = document.querySelectorAll(".slide");
      let index = 0;

      function showSlide(i) {
        slides[index].classList.remove("active");
        index = (i + slides.length) % slides.length;
        slides[index].classList.add("active");
      }

      document.querySelector(".next").onclick = () => showSlide(index + 1);
      document.querySelector(".prev").onclick = () => showSlide(index - 1);

      // auto-rotate every 3 seconds
      setInterval(() => showSlide(index + 1), 3000);

      // code for rotate screen start
      function checkOrientation() {
        let isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);

        if (isMobile && window.innerHeight > window.innerWidth) {
          document.getElementById("rotateMessage").style.display = "flex";
          document.getElementById("mainContent").style.display = "none";
        } else {
          document.getElementById("rotateMessage").style.display = "none";
          document.getElementById("mainContent").style.display = "block";
        }
      }

      window.onload = checkOrientation;
      window.onresize = checkOrientation;
      // code for rotate screen end
    </script>
  </body>
</html>
